---
- name: Stop all llama.cpp server instances
  hosts: sparky
  become: yes
  tasks:
    - name: Stop llama.cpp services
      ansible.builtin.systemd:
        name: "{{ item.name }}"
        state: stopped
      loop: "{{ llama_cpp_instances }}"
      when: llama_cpp_instances | length > 0
      loop_control:
        label: "{{ item.name }}"

    - name: Stop llama.cpp MTP services
      ansible.builtin.systemd:
        name: "{{ item.name }}"
        state: stopped
      loop: "{{ llama_cpp_mtp_instances }}"
      when: llama_cpp_mtp_instances | length > 0
      loop_control:
        label: "{{ item.name }}"
